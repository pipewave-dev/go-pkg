ENV_NAME: "development"
POD_NAME: "pipewave-pod-1"
VERSION: "1.0.0"

AUTO_MIGRATION: true

DEBUG:
  ENABLED: true

WORKER_POOL:
  BUFFER: 128
  UPPER_THRESHOLD: 64
  LOWER_THRESHOLD: 16

# IETF language tag. See: https://en.wikipedia.org/wiki/IETF_language_tag#List_of_common_primary_language_subtags
DEFAULT_LANG: "en"

# Timezone name. See: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
TIME_ZONE: "Asia/Tokyo"

TRACE_ID_HEADER: "X-Trace-Id"
IP_HEADER: "X-Real-Ip"

CORS:
  ENABLED: true
  EXACTLY_ORIGINS: []
    # - http://localhost:3100
  REGEX_ORIGINS:
    - ws://localhost:([0-9]+)
    - wss://localhost:([0-9]+)
    - http://localhost:([0-9]+)
    - https://localhost:([0-9]+)

RATE_LIMITER:
  USER_RATE: 100
  USER_BURST: 200
  ANONYMOUS_RATE: 10
  ANONYMOUS_BURST: 20

OTEL:
  ENABLED: false
  AUTO_INSTRUMENTATION: false
  # One of: discard, stdout, file, otlp-grpc, otlp-http
  EXPORTER_TYPE: "discard"
  # Required when EXPORTER_TYPE is "file"
  FILE_PATH: ""
  # Required when EXPORTER_TYPE is "otlp-grpc" or "otlp-http"
  COLLECTOR_ENDPOINT: ""
  COLLECTOR_INSECURE: false

VALKEY:
  PRIMARY_ADDRESS: "localhost:29100"
  REPLICA_ADDRESS: "localhost:29100"
  PASSWORD: veryStrongP@ssw0rd
  DB_INDEX: 0

DYNAMODB:
  CREATE_TABLES: true
  REGION: "ap-northeast-1"
  ENDPOINT: http://localhost:29101
  # ROLE: null
  # PROFILE: null
  # STATIC_ACCESS_KEY: null
  # STATIC_SECRET_KEY: null

DYNAMO_TABLES:
  ACTIVE_CONNECTION: "active_connection_dev"
  FCM_DEVICE: "fcm_device_dev"
  GROUP: "group_dev"
  USER: "user_dev"
  USER_GROUP: "user_group_dev"
  NOTI_CONTENT: "noti_content_dev"
  G_NOTI: "g_noti_dev"
  U_NOTI: "u_noti_dev"
  NOTI_TIME_BUCKET: "noti_time_bucket_dev"

POSTGRES:
  CREATE_TABLES: true
  HOST: localhost
  PORT: 29102
  DB_NAME: postgres
  USER: postgres
  PASSWORD: postgres
  SSL_MODE: disable
  MAX_CONNS: 15
  MIN_CONNS: 1
